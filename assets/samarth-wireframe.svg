<svg viewBox="0 0 1040 840" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="stickyshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2.5" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <style>
    .pg     { fill: #FAFAF9; }
    .box    { fill: #FFFFFF; stroke: #1F1F1F; stroke-width: 1.5; }
    .boxd   { fill: none; stroke: #BDBAB2; stroke-width: 1.3; stroke-dasharray: 3 3; }
    .crit   { fill: #FFFFFF; stroke: #C0463D; stroke-width: 1.6; }
    .ph     { fill: #ECEAE4; }
    .navbox { fill: none; stroke: #CFCCC4; stroke-width: 1.2; stroke-dasharray: 2 3; }
    .navcur { fill: #1F1F1F; }
    .x      { stroke: #C9C6BD; stroke-width: 1; }
    .t8     { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 8px; letter-spacing: 0.04em; fill: #8C887E; }
    .t9     { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 9px; fill: #2B2B28; }
    .t9m    { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 9px; fill: #8C887E; }
    .t10b   { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-weight: 700; fill: #1F1F1F; }
    .t11b   { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: 700; fill: #1F1F1F; }
    .num    { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #1F1F1F; }
    .navw   { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 9.5px; fill: #FFFFFF; }
    .navg   { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 9.5px; fill: #9A968C; }
    .stick  { font-family: 'Segoe Print','Bradley Hand','Comic Sans MS', cursive; font-size: 9.5px; fill: #3A3220; }
    .stickh { font-family: 'Segoe Print','Bradley Hand','Comic Sans MS', cursive; font-size: 10.5px; font-weight: 700; fill: #3A3220; }
    .lbl    { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 8px; letter-spacing: 0.06em; fill: #9A968C; }
    .val    { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #1F1F1F; }
  </style>

  <rect width="1040" height="840" class="pg"/>

  <!-- ===== BRIEF BLOCK :: x24 y24 w488 h136 ===== -->
  <rect x="24" y="24" width="488" height="136" class="box"/>
  <text x="40" y="44" class="t11b" font-size="13">SAMARTH — Branch Manager Dashboard</text>

  <text x="40" y="64" class="lbl">GOAL</text>
  <text x="40" y="76" class="val">Help branch managers spot a sales issue within 30 sec of opening the app</text>

  <text x="40" y="92" class="lbl">PRIMARY USER</text>
  <text x="172" y="92" class="val" font-size="9">Branch Manager</text>
  <text x="280" y="92" class="lbl">FREQUENCY</text>
  <text x="356" y="92" class="val" font-size="9">Daily, before sales review</text>

  <text x="40" y="112" class="lbl">STATUS</text>
  <text x="172" y="112" class="val" font-size="9">Stakeholder review — iteration 2</text>

  <line x1="40" y1="126" x2="496" y2="126" class="navbox"/>
  <text x="40" y="142" class="lbl">PURPOSE</text>
  <text x="172" y="142" class="val" font-size="9">Validate information hierarchy before visual design</text>

  <!-- ===== JOURNEY BLOCK :: x528 y24 w488 h136 ===== -->
  <rect x="528" y="24" width="488" height="136" class="box"/>
  <text x="544" y="44" class="t10b">Morning routine — what the manager is doing</text>

  <g>
    <rect x="544" y="64" width="118" height="28" class="boxd"/>
    <text x="603" y="82" class="t9" text-anchor="middle">Open dashboard</text>
    <text x="666" y="82" class="t9m">→</text>

    <rect x="680" y="64" width="118" height="28" class="boxd"/>
    <text x="739" y="82" class="t9" text-anchor="middle">Are we on target?</text>
    <text x="802" y="82" class="t9m">→</text>

    <rect x="816" y="64" width="118" height="28" class="boxd"/>
    <text x="875" y="82" class="t9" text-anchor="middle">Which SE needs help?</text>

    <rect x="544" y="104" width="118" height="28" class="boxd"/>
    <text x="603" y="122" class="t9" text-anchor="middle">Declining customers?</text>
    <text x="666" y="122" class="t9m">→</text>

    <rect x="680" y="104" width="118" height="28" class="boxd"/>
    <text x="739" y="122" class="t9" text-anchor="middle">Which SKU caused it?</text>
    <text x="802" y="122" class="t9m">→</text>

    <rect x="816" y="104" width="118" height="28" class="box"/>
    <text x="875" y="122" class="t9" text-anchor="middle" font-weight="700">Take action</text>
  </g>

  <!-- ===== SIDEBAR :: x24 y176 w120 h568 ===== -->
  <rect x="24" y="176" width="120" height="568" class="box"/>
  <text x="40" y="200" class="t8">SAMARTH</text>

  <rect x="32" y="216" width="104" height="32" class="navcur"/>
  <text x="48" y="236" class="navw">Overview</text>

  <rect x="32" y="256" width="104" height="32" class="navbox"/>
  <text x="48" y="276" class="navg">Team perf.</text>

  <rect x="32" y="296" width="104" height="32" class="navbox"/>
  <text x="48" y="316" class="navg">Cust. insights</text>

  <rect x="32" y="336" width="104" height="32" class="navbox"/>
  <text x="48" y="356" class="navg">Targets</text>

  <rect x="32" y="376" width="104" height="32" class="navbox"/>
  <text x="48" y="396" class="navg">Reports</text>

  <line x1="32" y1="424" x2="136" y2="424" class="navbox"/>
  <text x="32" y="440" class="t8">SYSTEM</text>
  <rect x="32" y="448" width="104" height="32" class="navbox"/>
  <text x="48" y="468" class="navg">Admin panel</text>

  <text x="32" y="492" class="t8">IMPORTANCE</text>
  <text x="32" y="508" class="t9m" font-size="8">Revenue</text>
  <text x="32" y="522" class="t9m" font-size="8">↓ Alerts</text>
  <text x="32" y="536" class="t9m" font-size="8">↓ Performance</text>
  <text x="32" y="550" class="t9m" font-size="8">↓ Reports</text>

  <!-- ===== HEADER :: x160 y176 w856 h48 ===== -->
  <rect x="160" y="176" width="856" height="48" class="box"/>
  <text x="176" y="196" class="t8">DECISION WORKSPACE</text>
  <text x="176" y="214" class="t10b">Hyderabad Branch · 30 Jun 2026</text>
  <text x="900" y="214" class="t9m" text-anchor="end">updated 09:02 AM</text>

  <!-- ===== FILTER BAR :: y232 h32 ===== -->
  <rect x="160" y="232" width="856" height="32" class="boxd"/>
  <text x="176" y="252" class="t9m">[region ▾]   [SO name ▾]   [customer group ▾]   [product ▾]   — applies to all panels below</text>

  <!-- ===== KPI ROW :: y272 h96, 5 cards, gap 8 ===== -->
  <g>
    <rect x="160" y="272" width="152" height="96" class="box"/>
    <text x="176" y="292" class="t8">MTD SALES VOL</text>
    <text x="176" y="318" class="num">11.9L</text>
    <text x="176" y="344" class="t9m">↑ 0.8% YoY</text>

    <rect x="320" y="272" width="152" height="96" class="box"/>
    <text x="336" y="292" class="t8">GROWTH ACCOUNTS</text>
    <text x="336" y="318" class="num">2,400</text>
    <text x="336" y="344" class="t9m">+7.7% of LY</text>

    <rect x="480" y="272" width="152" height="96" class="crit"/>
    <text x="496" y="292" class="t8">DECLINE ACCOUNTS</text>
    <text x="496" y="318" class="num" fill="#C0463D">3,648</text>
    <text x="496" y="344" class="t9m">−11.6% of LY</text>

    <rect x="640" y="272" width="152" height="96" class="box"/>
    <text x="656" y="292" class="t8">NEW CUSTOMERS</text>
    <text x="656" y="318" class="num">1,772</text>
    <text x="656" y="344" class="t9m">+21.8% of LY</text>

    <rect x="800" y="272" width="216" height="96" class="box"/>
    <text x="816" y="292" class="t8">STAGNANT ACCOUNTS</text>
    <text x="816" y="318" class="num">1,841</text>
    <text x="816" y="344" class="t9m">~0.0% of LY</text>
  </g>

  <!-- ===== CHARTS ROW :: y384 h168 ===== -->
  <rect x="160" y="384" width="448" height="168" class="box"/>
  <text x="176" y="404" class="t10b">Regional performance — MTD vs LYMTD</text>
  <text x="176" y="420" class="t9m" font-style="italic">(line chart placeholder)</text>
  <line x1="176" y1="440" x2="592" y2="440" stroke="#CFCCC4" stroke-width="1"/>
  <line x1="176" y1="460" x2="592" y2="460" stroke="#CFCCC4" stroke-width="1"/>
  <line x1="176" y1="480" x2="592" y2="480" stroke="#CFCCC4" stroke-width="1"/>
  <line x1="176" y1="500" x2="592" y2="500" stroke="#CFCCC4" stroke-width="1"/>
  <path d="M 176 500 L 230 470 L 284 510 L 338 450 L 392 480 L 446 430 L 500 460 L 554 440" fill="none" stroke="#1F1F1F" stroke-width="1.6"/>

  <rect x="624" y="384" width="392" height="168" class="box"/>
  <text x="640" y="404" class="t10b">Month-end projection</text>
  <text x="640" y="420" class="t9m">run-rate × 30 days</text>
  <g>
    <rect x="656" y="468" width="24" height="64" class="ph"/>
    <rect x="696" y="484" width="24" height="48" class="boxd"/>
    <rect x="736" y="484" width="24" height="48" class="boxd"/>
  </g>
  <rect x="640" y="536" width="360" height="16" class="boxd"/>
  <text x="820" y="548" class="t9" text-anchor="middle" font-size="8">"on track" banner — green if ahead of LY</text>

  <!-- ===== TODAY'S PRIORITIES :: y568 h104 ===== -->
  <rect x="160" y="568" width="456" height="104" class="crit"/>
  <text x="176" y="588" class="t10b">Today's priorities</text>

  <text x="176" y="608" class="t9" font-weight="700">①</text>
  <text x="194" y="608" class="t9">108 customers gone dark — zero sales this month</text>

  <text x="176" y="626" class="t9" font-weight="700">②</text>
  <text x="194" y="626" class="t9">14 SEs below collection target for 4+ days</text>

  <text x="176" y="644" class="t9" font-weight="700">③</text>
  <text x="194" y="644" class="t9">Revenue trailing run-rate in TG-2, AP zones</text>

  <text x="176" y="662" class="t9m" font-style="italic" font-size="8">ranked by revenue-at-risk, not recency</text>

  <!-- ===== DESIGN PRINCIPLES :: y690 h56 ===== -->
  <rect x="160" y="690" width="856" height="54" class="box"/>
  <text x="176" y="708" class="t10b">Design principles</text>
  <text x="176" y="724" class="t9m" font-size="8">Surface problems first, not just numbers.   ·   Drill down in ≤3 clicks.   ·   Every metric should answer "should I act?"</text>
  <text x="176" y="736" class="t9m" font-size="8">Role-scoped by default — branch manager sees only their branch, never the full network.</text>

  <!-- sticky 1: on KPI row, tradeoff -->
  <g transform="translate(560,320) rotate(2)" filter="url(#stickyshadow)">
    <rect x="0" y="0" width="190" height="64" fill="#FFC9C0"/>
    <text x="10" y="16" class="stickh">Why red border?</text>
    <text x="10" y="30" class="stick">manager shouldn't need to</text>
    <text x="10" y="42" class="stick">read numbers to know what</text>
    <text x="10" y="54" class="stick">needs attention today</text>
  </g>

  <!-- sticky 2: insights tradeoff -->
  <g transform="translate(632,568) rotate(-1)" filter="url(#stickyshadow)">
    <rect x="0" y="0" width="384" height="104" fill="#C9E4D6"/>
    <text x="14" y="22" class="stickh">Tradeoff: absolute vs %</text>
    <text x="14" y="42" class="stick">v1 showed % decline only — ZH said small</text>
    <text x="14" y="58" class="stick">accounts looked scarier than big ones in %</text>
    <text x="14" y="74" class="stick">terms. v2 ranks by revenue-at-risk instead,</text>
    <text x="14" y="90" class="stick">leadership compared both before deciding.</text>
  </g>

  <!-- sticky 3: open question -->
  <g transform="translate(160,760) rotate(1.5)" filter="url(#stickyshadow)">
    <rect x="0" y="0" width="380" height="56" fill="#FFE998"/>
    <text x="12" y="20" class="stickh">Open: notification model</text>
    <text x="12" y="36" class="stick">does this stay pull (open app to see)</text>
    <text x="12" y="50" class="stick">or push (SMS/WhatsApp alert) in v2?</text>
  </g>

  <!-- sticky 4: sidebar scope -->
  <g transform="translate(38,660) rotate(-3)" filter="url(#stickyshadow)">
    <rect x="0" y="0" width="96" height="56" fill="#FFE998"/>
    <text x="8" y="16" class="stick">other tabs,</text>
    <text x="8" y="28" class="stick">same nav —</text>
    <text x="8" y="40" class="stick">out of scope</text>
    <text x="8" y="52" class="stick">this pass</text>
  </g>

</svg>
